<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSmini - Hardware System</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Internal:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                    colors: {
                        primary: '#6366f1', // Indigo 500
                        secondary: '#ec4899', // Pink 500
                        dark: '#0f172a', // Slate 900
                        surface: '#1e293b', // Slate 800
                    }
                }
            }
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom Styles for Print and Glassmorphism -->
    <style>
        body {
            background-color: #0b1120;
            /* Deep Slate/Black */
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(20, 184, 166, 0.15) 0px, transparent 50%);
            background-attachment: fixed;
            color: #e2e8f0;
        }

        /* Premium Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.2);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(148, 163, 184, 0.4);
        }

        /* Glassmorphism utility - Enhanced */
        .glass {
            background: rgba(30, 41, 59, 0.4);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .glass-card {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: rgba(99, 102, 241, 0.3);
        }

        /* Glow Effects */
        .glow-text {
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        .glow-border {
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
        }

        /* Smooth Transitions */
        button,
        a,
        input,
        select,
        .item-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Hide scrollbar for specific elements but keep functionality */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* Print Styles */
        @media print {
            body {
                visibility: hidden;
                overflow: visible !important;
                height: auto !important;
                background: white !important;
            }

            #receipt-print-area {
                visibility: visible;
                display: block !important;
                position: absolute;
                left: 0;
                top: 0;
                width: 58mm;
                background: white;
                color: black;
                padding: 0;
                margin: 0;
            }

            #receipt-print-area * {
                visibility: visible;
            }

            aside,
            main,
            #toast-container {
                display: none !important;
            }
        }

        .fade-in {
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px) scale(0.98);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* LIGHT MODE OVERRIDES - ENHANCED */
        body.light-mode {
            background-color: #f8fafc;
            /* slate-50 */
            color: #1e293b;
            /* slate-800 */
        }

        /* Generic Backgrounds */
        body.light-mode .bg-slate-950,
        body.light-mode .bg-slate-900,
        body.light-mode .bg-slate-800 {
            background-color: #ffffff !important;
            color: #0f172a !important;
            border-color: #e2e8f0 !important;
        }

        body.light-mode .bg-slate-700 {
            background-color: #f1f5f9 !important;
            /* slate-100 */
            color: #0f172a !important;
        }

        /* Opacity/Transparency Overrides */
        body.light-mode .bg-slate-900\/50,
        body.light-mode .bg-slate-800\/50,
        body.light-mode .bg-slate-800\/80,
        body.light-mode .bg-slate-700\/50,
        body.light-mode .bg-slate-700\/30 {
            background-color: rgba(255, 255, 255, 0.5) !important;
            border-color: #e2e8f0 !important;
        }

        /* Text Color Overrides */
        body.light-mode .text-white {
            color: #1e293b !important;
        }

        /* slate-800 */
        body.light-mode .text-slate-200 {
            color: #334155 !important;
        }

        /* slate-700 */
        body.light-mode .text-slate-300 {
            color: #475569 !important;
        }

        /* slate-600 */
        body.light-mode .text-slate-400 {
            color: #64748b !important;
        }

        /* slate-500 */
        body.light-mode .text-slate-500 {
            color: #94a3b8 !important;
        }

        /* slate-400 */

        /* Border Overrides */
        body.light-mode .border-slate-700,
        body.light-mode .border-slate-600,
        body.light-mode .border-slate-700\/50 {
            border-color: #e2e8f0 !important;
            /* slate-200 */
        }

        /* Inputs & Form Elements */
        body.light-mode input,
        body.light-mode select,
        body.light-mode textarea {
            background-color: #ffffff !important;
            border-color: #cbd5e1 !important;
            color: #1e293b !important;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        body.light-mode input:focus,
        body.light-mode select:focus,
        body.light-mode textarea:focus {
            border-color: #6366f1 !important;
            box-shadow: 0 0 0 2px #e0e7ff !important;
        }

        /* Sidebar & Nav */
        body.light-mode aside {
            background-color: #ffffff !important;
            border-right: 1px solid #e2e8f0 !important;
        }

        body.light-mode .nav-item:not(.active):hover {
            background-color: #f1f5f9 !important;
            color: #1e293b !important;
        }

        body.light-mode .nav-item.active {
            background-color: #e0e7ff !important;
            color: #4338ca !important;
        }

        /* Glassmorphism Restore for Light Mode */
        body.light-mode .glass {
            background: rgba(255, 255, 255, 0.8) !important;
            border: 1px solid rgba(0, 0, 0, 0.05) !important;
            backdrop-filter: blur(12px);
        }

        /* Table Specifics */
        body.light-mode thead {
            background-color: #f8fafc !important;
            color: #475569 !important;
        }

        body.light-mode tr:hover td {
            background-color: #f8fafc !important;
        }

        body.light-mode tr.hover\:bg-slate-700\/50:hover,
        body.light-mode tr.hover\:bg-slate-700\/30:hover {
            background-color: #f8fafc !important;
        }

        /* Status Colors */
        body.light-mode .text-emerald-400 {
            color: #059669 !important;
        }

        body.light-mode .text-red-400 {
            color: #dc2626 !important;
        }

        /* LIGHT MODE OVERRIDES */
        body.light-mode {
            background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%);
            color: #1e293b;
        }

        body.light-mode .glass-card {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(0, 0, 0, 0.05);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        body.light-mode .glass-card:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(99, 102, 241, 0.3);
            /* indigo-500/30 */
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.025);
        }

        body.light-mode h1,
        body.light-mode h2,
        body.light-mode h3,
        body.light-mode h4,
        body.light-mode strong {
            color: #0f172a !important;
            /* slate-900 */
        }

        body.light-mode h2.bg-clip-text {
            background: linear-gradient(to right, #4f46e5, #9333ea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            color: transparent !important;
        }

        body.light-mode p,
        body.light-mode span,
        body.light-mode label,
        body.light-mode i:not(.text-indigo-400):not(.text-emerald-400):not(.text-rose-400) {
            color: #475569;
            /* slate-600 */
        }

        body.light-mode .text-slate-300,
        body.light-mode .text-slate-400,
        body.light-mode .text-slate-500 {
            color: #64748b !important;
            /* slate-500 override */
        }

        body.light-mode .text-white {
            color: #1e293b !important;
            /* slate-800 override */
        }

        body.light-mode input,
        body.light-mode select,
        body.light-mode textarea {
            background-color: #ffffff !important;
            border-color: #cbd5e1 !important;
            /* slate-300 */
            color: #1e293b !important;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.05);
        }

        body.light-mode input::placeholder {
            color: #94a3b8;
        }

        body.light-mode .bg-slate-800,
        body.light-mode .bg-slate-900 {
            background-color: #ffffff !important;
            border-color: #e2e8f0 !important;
            /* slate-200 */
        }

        body.light-mode .bg-slate-800\/50,
        body.light-mode .bg-slate-800\/30,
        body.light-mode .bg-slate-800\/40,
        body.light-mode .bg-slate-800\/80 {
            background-color: rgba(255, 255, 255, 0.6) !important;
            border-color: rgba(0, 0, 0, 0.05) !important;
        }

        body.light-mode .bg-slate-900\/50,
        body.light-mode .bg-slate-900\/80 {
            background-color: rgba(255, 255, 255, 0.8) !important;
            border-color: rgba(0, 0, 0, 0.1) !important;
        }

        body.light-mode aside {
            background: rgba(255, 255, 255, 0.8) !important;
            border-right: 1px solid rgba(0, 0, 0, 0.05) !important;
        }

        body.light-mode aside button {
            color: #64748b !important;
        }

        body.light-mode aside button:hover,
        body.light-mode aside button.active {
            background-color: #e0e7ff !important;
            /* indigo-50 */
            color: #4338ca !important;
            /* indigo-700 */
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.1);
        }

        body.light-mode .glow-text {
            text-shadow: none !important;
        }

        body.light-mode .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
        }

        body.light-mode .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
        }

        body.light-mode .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        body.light-mode .text-indigo-400 {
            color: #4f46e5 !important;
        }

        body.light-mode .text-pink-400 {
            color: #db2777 !important;
        }

        body.light-mode .text-teal-400 {
            color: #0d9488 !important;
        }

        body.light-mode .text-yellow-400 {
            color: #d97706 !important;
        }

        /* Badges */
        body.light-mode .bg-green-500\/20 {
            background-color: #dcfce7 !important;
            color: #15803d !important;
        }

        body.light-mode .bg-blue-500\/20 {
            background-color: #dbeafe !important;
            color: #1d4ed8 !important;
        }

        body.light-mode .bg-indigo-500\/20 {
            background-color: #e0e7ff !important;
            color: #4338ca !important;
        }

        body.light-mode .bg-pink-500\/20 {
            background-color: #fce7f3 !important;
            color: #be185d !important;
        }

        body.light-mode .bg-teal-500\/20 {
            background-color: #ccfbf1 !important;
            color: #0f766e !important;
        }

        /* Gradient Fixes */
        body.light-mode .from-white {
            --tw-gradient-from: #0f172a !important;
            --tw-gradient-stops: var(--tw-gradient-from), var(--tw-gradient-to, rgba(255, 255, 255, 0)) !important;
        }

        body.light-mode .to-slate-400 {
            --tw-gradient-to: #475569 !important;
        }
    </style>
</head>

<body class="h-screen w-screen overflow-hidden flex font-sans text-slate-200">

    <!-- Sidebar -->
    <aside
        class="w-64 glass h-full flex flex-col justify-between border-r border-slate-700 z-10 transition-all duration-300 transform md:translate-x-0 -translate-x-full md:static absolute">
        <div>
            <div class="p-6 flex items-center justify-center border-b border-slate-700">
                <div class="flex items-center gap-2">
                    <i data-lucide="monitor-check" class="text-primary w-8 h-8"></i>
                    <h1
                        class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-pink-500 bg-clip-text text-transparent">
                        POSmini</h1>
                </div>
            </div>

            <nav class="mt-6 px-4 space-y-2">
                <button onclick="app.navigate('dashboard')" id="nav-dashboard"
                    class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-700/50 text-slate-400 hover:text-white group active">
                    <i data-lucide="layout-dashboard" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                    <span class="font-medium">Dashboard</span>
                </button>
                <button onclick="app.navigate('pos')" id="nav-pos"
                    class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-700/50 text-slate-400 hover:text-white group">
                    <i data-lucide="shopping-cart" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                    <span class="font-medium">POS / Sales</span>
                </button>
                <button onclick="app.navigate('inventory')" id="nav-inventory"
                    class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-700/50 text-slate-400 hover:text-white group">
                    <i data-lucide="package" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                    <span class="font-medium">Inventory</span>
                </button>
                <button onclick="app.navigate('customers')" id="nav-customers"
                    class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-700/50 text-slate-400 hover:text-white group">
                    <i data-lucide="users" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                    <span class="font-medium">Customers</span>
                </button>
                <button onclick="app.navigate('suppliers')" id="nav-suppliers"
                    class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-700/50 text-slate-400 hover:text-white group">
                    <i data-lucide="truck" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                    <span class="font-medium">Suppliers</span>
                </button>
                <button onclick="app.navigate('reports')" id="nav-reports"
                    class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-700/50 text-slate-400 hover:text-white group">
                    <i data-lucide="history" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                    <span class="font-medium">History</span>
                </button>
                <button onclick="app.navigate('settings')" id="nav-settings"
                    class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all hover:bg-slate-700/50 text-slate-400 hover:text-white group">
                    <i data-lucide="settings" class="w-5 h-5 group-hover:scale-110 transition-transform"></i>
                    <span class="font-medium">Settings</span>
                </button>
            </nav>
        </div>

        <div class="p-4 border-t border-slate-700 space-y-3">
            <!-- Language Toggle -->
            <div class="bg-slate-900/50 p-1 rounded-lg flex text-center mb-2">
                <button onclick="app.toggleLanguage('en')" id="lang-en"
                    class="flex-1 py-1.5 rounded-md text-xs font-bold transition-all">English</button>
                <button onclick="app.toggleLanguage('si')" id="lang-si"
                    class="flex-1 py-1.5 rounded-md text-xs font-bold transition-all">සිංහල</button>
            </div>

            <button id="btn-backup" onclick="app.backupData()"
                class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-slate-700 hover:bg-slate-600 transition-colors text-sm font-medium text-slate-300">
                <i data-lucide="download" class="w-4 h-4"></i>
                Backup Data
            </button>
            <button id="btn-restore" onclick="document.getElementById('restore-file').click()"
                class="w-full flex items-center justify-center gap-2 px-4 py-2 rounded-lg bg-slate-800 hover:bg-slate-700 border border-slate-700 transition-colors text-sm font-medium text-slate-400">
                <i data-lucide="upload" class="w-4 h-4"></i>
                Restore Data
            </button>
            <input type="file" id="restore-file" class="hidden" accept=".json" onchange="app.restoreData(this)">
            <div class="mt-2 text-xs text-center text-slate-500">v1.0.0 | Offline Ready</div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Header for Mobile Toggle (Hidden on Desktop) -->
        <header class="md:hidden flex items-center justify-between p-4 glass border-b border-slate-700">
            <h1 class="text-lg font-bold">POSmini</h1>
            <button class="p-2 rounded-lg bg-slate-700"
                onclick="document.querySelector('aside').classList.toggle('-translate-x-full')">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
        </header>

        <!-- Dynamic Views Container -->
        <div id="app-container" class="flex-1 overflow-auto p-6 relative">





            <!-- Language Toggle moved to Sidebar -->

            <!-- Views will be injected here by app.js -->

        </div>

        <!-- Notification Toast -->
        <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

    </main>

    <!-- Receipt Print Area (Moved outside main) -->
    <div id="receipt-print-area" class="hidden bg-white text-black p-2 font-mono text-xs"></div>

    <!-- Scripts -->
    <script src="https://unpkg.com/dexie/dist/dexie.js"></script>
    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
